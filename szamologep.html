<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<title>Számológép</title>
</head>
<body>

<h2>Egyszerű számológép</h2>

<label>Művelet:</label>
<select id="muvelet">
<option value="1">Összeadás</option>
<option value="2">Kivonás</option>
<option value="3">Szorzás</option>
<option value="4">Osztás</option>
<option value="5">Négyzetre emelés</option>
</select>

<br><br>

<label>Első szám:</label>
<input type="number" id="a">

<br><br>

<label>Második szám:</label>
<input type="number" id="b">

<br><br>

<button onclick="szamol()">Számol</button>

<h3>Eredmény: <span id="eredmeny"></span></h3>

<script>
function szamol() {

let g = document.getElementById("muvelet").value;
let a = Number(document.getElementById("a").value);
let b = Number(document.getElementById("b").value);
let eredmeny;

if (g == 1) {
    eredmeny = a + b;
}

if (g == 2) {
    eredmeny = a - b;
}

if (g == 3) {
    eredmeny = a * b;
}

if (g == 4) {
    eredmeny = a / b;
}

if (g == 5) {
    eredmeny = a * a;
}

document.getElementById("eredmeny").innerText = eredmeny;

}
</script>

</body>
</html>
